<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
 <title>优品商城 · 购物平台</title>
 <style>
 /* ===== CSS Variables & Reset ===== */
 :root {
 --primary: #4f7df3;
 --primary-dark: #3a5fcf;
 --primary-light: #e8edfd;
 --danger: #f56c6c;
 --success: #67c23a;
 --gray-100: #f7f8fa;
 --gray-200: #eaeef3;
 --gray-300: #d9dde4;
 --gray-500: #8c8f99;
 --gray-700: #4a4d57;
 --gray-900: #1d2129;
 --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
 --radius: 16px;
 --radius-sm: 10px;
 --transition: 0.25s ease;
 --font: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
 }
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }
 body {
 font-family: var(--font);
 background: var(--gray-100);
 color: var(--gray-900);
 padding-top: 72px;
 min-height: 100vh;
 }
 button {
 cursor: pointer;
 font-family: inherit;
 border: none;
 background: none;
 font-size: inherit;
 }
 img {
 display: block;
 max-width: 100%;
 }
 a {
 text-decoration: none;
 color: inherit;
 }
 /* ===== Header ===== */
 .header {
 position: fixed;
 top: 0;
 left: 0;
 right: 0;
 height: 64px;
 background: #ffffff;
 box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 0 24px;
 z-index: 1000;
 backdrop-filter: blur(6px);
 background: rgba(255, 255, 255, 0.92);
 }
 .logo {
 font-size: 22px;
 font-weight: 700;
 color: var(--primary);
 letter-spacing: -0.5px;
 display: flex;
 align-items: center;
 gap: 6px;
 }
 .logo span {
 background: var(--primary);
 color: #fff;
 font-size: 14px;
 padding: 2px 10px;
 border-radius: 30px;
 font-weight: 500;
 letter-spacing: 0;
 }
 .header-search {
 flex: 0 1 420px;
 display: flex;
 background: var(--gray-100);
 border-radius: 40px;
 padding: 6px 6px 6px 18px;
 border: 1px solid transparent;
 transition: var(--transition);
 }
 .header-search:focus-within {
 border-color: var(--primary);
 background: #fff;
 box-shadow: 0 0 0 3px rgba(79, 125, 243, 0.15);
 }
 .header-search input {
 flex: 1;
 border: none;
 background: transparent;
 outline: none;
 font-size: 14px;
 padding: 8px 0;
 color: var(--gray-900);
 }
 .header-search input::placeholder {
 color: var(--gray-500);
 }
 .header-search button {
 background: var(--primary);
 color: #fff;
 padding: 8px 20px;
 border-radius: 40px;
 font-size: 14px;
 font-weight: 500;
 transition: var(--transition);
 }
 .header-search button:hover {
 background: var(--primary-dark);
 }
 .header-actions {
 display: flex;
 align-items: center;
 gap: 18px;
 }
 .cart-btn {
 position: relative;
 display: flex;
 align-items: center;
 gap: 6px;
 padding: 8px 16px 8px 12px;
 background: var(--gray-100);
 border-radius: 40px;
 font-size: 15px;
 font-weight: 500;
 transition: var(--transition);
 color: var(--gray-700);
 }
 .cart-btn:hover {
 background: var(--primary-light);
 color: var(--primary);
 }
 .cart-btn .cart-icon {
 font-size: 22px;
 line-height: 1;
 }
 .cart-badge {
 background: var(--danger);
 color: #fff;
 font-size: 12px;
 font-weight: 600;
 min-width: 20px;
 height: 20px;
 border-radius: 30px;
 display: inline-flex;
 align-items: center;
 justify-content: center;
 padding: 0 6px;
 margin-left: 2px;
 }
 .user-avatar {
 width: 38px;
 height: 38px;
 background: var(--primary-light);
 border-radius: 50%;
 display: flex;
 align-items: center;
 justify-content: center;
 color: var(--primary);
 font-weight: 600;
 font-size: 16px;
 }

 /* ===== Main Layout ===== */
 .container {
 max-width: 1280px;
 margin: 0 auto;
 padding: 24px 20px 60px;
 }

 /* ===== Home Page ===== */
 #home-page {
 display: block;
 }
 .page-title {
 font-size: 24px;
 font-weight: 600;
 margin-bottom: 24px;
 display: flex;
 align-items: center;
 gap: 12px;
 }
 .page-title small {
 font-size: 14px;
 font-weight: 400;
 color: var(--gray-500);
 }

 .product-grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
 gap: 20px;
 }

 /* ===== Product Card ===== */
 .product-card {
 background: #fff;
 border-radius: var(--radius);
 overflow: hidden;
 box-shadow: var(--shadow);
 transition: transform var(--transition), box-shadow var(--transition);
 cursor: pointer;
 display: flex;
 flex-direction: column;
 }
 .product-card:hover {
 transform: translateY(-4px);
 box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12);
 }
 .product-card .img-wrap {
 background: var(--gray-100);
 aspect-ratio: 1 / 1;
 display: flex;
 align-items: center;
 justify-content: center;
 overflow: hidden;
 }
 .product-card .img-wrap img {
 width: 100%;
 height: 100%;
 object-fit: cover;
 transition: transform 0.4s;
 }
 .product-card:hover .img-wrap img {
 transform: scale(1.03);
 }
 .product-card .info {
 padding: 14px 16px 16px;
 flex: 1;
 display: flex;
 flex-direction: column;
 }
 .product-card .name {
 font-weight: 500;
 font-size: 15px;
 line-height: 1.4;
 margin-bottom: 4px;
 display: -webkit-box;
 -webkit-line-clamp: 2;
 -webkit-box-orient: vertical;
 overflow: hidden;
 }
 .product-card .price {
 font-size: 20px;
 font-weight: 700;
 color: var(--danger);
 margin: 8px 0 12px;
 }
 .product-card .price small {
 font-size: 14px;
 font-weight: 400;
 color: var(--gray-500);
 text-decoration: line-through;
 margin-left: 8px;
 }
 .product-card .actions {
 display: flex;
 gap: 8px;
 margin-top: auto;
 }
 .product-card .actions button {
 flex: 1;
 padding: 8px 0;
 border-radius: 40px;
 font-weight: 500;
 font-size: 14px;
 transition: var(--transition);
 }
 .btn-primary {
 background: var(--primary);
 color: #fff;
 }
 .btn-primary:hover {
 background: var(--primary-dark);
 }
 .btn-outline {
 background: transparent;
 color: var(--primary);
 border: 1.5px solid var(--primary);
 }
 .btn-outline:hover {
 background: var(--primary-light);
 }

 /* ===== Detail Modal ===== */
 .modal-overlay {
 position: fixed;
 inset: 0;
 background: rgba(0, 0, 0, 0.45);
 backdrop-filter: blur(4px);
 z-index: 2000;
 display: flex;
 align-items: center;
 justify-content: center;
 padding: 20px;
 opacity: 0;
 visibility: hidden;
 transition: opacity 0.3s, visibility 0.3s;
 }
 .modal-overlay.active {
 opacity: 1;
 visibility: visible;
 }
 .modal-box {
 background: #fff;
 border-radius: var(--radius);
 max-width: 720px;
 width: 100%;
 max-height: 90vh;
 overflow-y: auto;
 padding: 32px 28px;
 transform: scale(0.96) translateY(20px);
 transition: transform 0.3s var(--transition);
 box-shadow: 0 32px 64px rgba(0, 0, 0, 0.2);
 }
 .modal-overlay.active .modal-box {
 transform: scale(1) translateY(0);
 }
 .modal-close {
 float: right;
 font-size: 28px;
 line-height: 1;
 color: var(--gray-500);
 transition: var(--transition);
 background: none;
 border: none;
 padding: 4px 8px;
 }
 .modal-close:hover {
 color: var(--gray-900);
 transform: rotate(90deg);
 }
 .modal-body {
 display: flex;
 flex-direction: column;
 gap: 20px;
 }
 .modal-body .detail-img {
 width: 100%;
 max-height: 360px;
 object-fit: contain;
 background: var(--gray-100);
 border-radius: var(--radius-sm);
 }
 .modal-body .detail-name {
 font-size: 24px;
 font-weight: 600;
 }
 .modal-body .detail-price {
 font-size: 28px;
 font-weight: 700;
 color: var(--danger);
 }
 .modal-body .detail-desc {
 color: var(--gray-700);
 line-height: 1.6;
 }
 .modal-body .detail-spec {
 display: flex;
 gap: 12px;
 flex-wrap: wrap;
 margin: 8px 0;
 }
 .modal-body .detail-spec button {
 padding: 6px 18px;
 border: 1.5px solid var(--gray-300);
 border-radius: 40px;
 background: #fff;
 transition: var(--transition);
 font-size: 14px;
 }
 .modal-body .detail-spec button.active {
 border-color: var(--primary);
 background: var(--primary-light);
 color: var(--primary);
 font-weight: 500;
 }
 .modal-body .detail-spec button:hover {
 border-color: var(--primary);
 }
 .modal-body .detail-actions {
 display: flex;
 gap: 16px;
 margin-top: 8px;
 }
 .modal-body .detail-actions button {
 flex: 1;
 padding: 14px 0;
 border-radius: 40px;
 font-weight: 600;
 font-size: 16px;
 }

 /* ===== Cart Panel (slide-in) ===== */
 .cart-panel {
 position: fixed;
 top: 0;
 right: 0;
 bottom: 0;
 width: 420px;
 max-width: 92vw;
 background: #fff;
 z-index: 1500;
 box-shadow: -8px 0 32px rgba(0, 0, 0, 0.1);
 transform: translateX(110%);
 transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
 display: flex;
 flex-direction: column;
 padding: 24px 20px 20px;
 }
 .cart-panel.open {
 transform: translateX(0);
 }
 .cart-backdrop {
 position: fixed;
 inset: 0;
 background: rgba(0, 0, 0, 0.3);
 z-index: 1400;
 opacity: 0;
 visibility: hidden;
 transition: opacity 0.3s, visibility 0.3s;
 }
 .cart-backdrop.active {
 opacity: 1;
 visibility: visible;
 }
 .cart-header {
